version: "3.9"

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.2
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - ./mlflow:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  trainer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=${MLFLOW_EXPERIMENT_NAME:-license_forecasting}
    volumes:
      - ./backend/data:/app/data
      - ./backend/models:/app/models
      - ./mlflow:/app/mlflow
    command: >
      sh -c "python -m ml.data_generator &&
             python -m ml.train_prophet &&
             python -m ml.train_arima"
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=${MLFLOW_EXPERIMENT_NAME:-license_forecasting}
      - MODEL_CACHE_DIR=/app/models
      - DATA_DIR=/app/data
      - CORS_ORIGINS=http://localhost:${FRONTEND_PORT:-3000}
      - LOG_LEVEL=INFO
    volumes:
      - ./backend/data:/app/data
      - ./backend/models:/app/models
      - ./mlflow:/app/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
